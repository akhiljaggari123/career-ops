<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter — {{COMPANY}}</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    line-height: 1.55;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 2px 0;
  }

  /* === HEADER (matches CV) === */
  .header {
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 10px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
    color: #4a5568;
  }

  .contact-row a {
    color: hsl(187, 74%, 32%);
    text-decoration: none;
  }

  .separator {
    color: #cbd5e0;
  }

  /* === LETTER BODY === */
  .meta {
    margin-bottom: 18px;
    font-size: 11px;
    color: #2d3748;
  }

  .meta .date {
    margin-bottom: 14px;
  }

  .recipient {
    margin-bottom: 16px;
    font-size: 11px;
    line-height: 1.5;
  }

  .recipient .salutation {
    margin-top: 4px;
  }

  .salutation-line {
    margin-bottom: 12px;
    font-weight: 500;
  }

  .body-text p {
    margin-bottom: 11px;
    text-align: justify;
    hyphens: auto;
  }

  .body-text p:last-child {
    margin-bottom: 0;
  }

  /* Subtle highlight for proof-point metric phrases */
  .body-text strong {
    font-weight: 600;
    color: #1a1a2e;
  }

  /* === SIGN-OFF === */
  .sign-off {
    margin-top: 22px;
  }

  .sign-off .closing {
    margin-bottom: 4px;
  }

  .sign-off .signature-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #1a1a2e;
  }

  /* Print fidelity */
  @page {
    size: {{PAGE_SIZE}};
    margin: 18mm 18mm 18mm 18mm;
  }

  @media print {
    body { font-size: 11px; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- DATE -->
  <div class="meta">
    <div class="date">{{DATE}}</div>
  </div>

  <!-- RECIPIENT -->
  <div class="recipient">
    <div>{{HIRING_MANAGER}}</div>
    <div>{{COMPANY}}</div>
  </div>

  <!-- SALUTATION -->
  <div class="salutation-line">Dear {{HIRING_MANAGER_FIRSTLINE}},</div>

  <!-- BODY -->
  <div class="body-text">
    <!-- Para 1 — Hook with company-specific signal -->
    <p>{{PARA_1_HOOK}}</p>

    <!-- Para 2 — Proof point #1 with metric tied to JD's biggest requirement -->
    <p>{{PARA_2_PROOF_1}}</p>

    <!-- Para 3 — Proof point #2 + skill match (cite 3 JD keywords) -->
    <p>{{PARA_3_PROOF_2}}</p>

    <!-- Para 4 — Closing CTA (1 sentence, confident not pleading) -->
    <p>{{PARA_4_CLOSING}}</p>
  </div>

  <!-- SIGN-OFF -->
  <div class="sign-off">
    <div class="closing">{{CLOSING}}</div>
    <div class="signature-name">{{NAME}}</div>
  </div>

</div>
</body>
</html>
